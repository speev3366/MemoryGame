<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Theme Strip Regression v845</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #0b1020;
      color: #e7edf8;
    }
    body {
      margin: 0;
      background: #0b1020;
    }
    .wrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 10px;
    }
    .panel {
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      padding: 8px 10px;
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 8px;
    }
    .ok {
      color: #9bff90;
    }
    .bad {
      color: #ff8f8f;
    }
    .log {
      font-size: 12px;
      line-height: 1.35;
      white-space: pre-wrap;
      max-height: 190px;
      overflow: auto;
      margin: 0;
    }
    iframe {
      width: 1920px;
      height: 900px;
      border: 0;
      background: #0b1020;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <p class="title">v845 Strip Regression (категории 6/7/8)</p>
      <p id="status" class="title">Тестът стартира...</p>
      <pre id="log" class="log"></pre>
    </div>
    <iframe id="appFrame" src="../index.html"></iframe>
  </div>

  <script>
    (function run() {
      const status = document.getElementById('status');
      const log = document.getElementById('log');
      const frame = document.getElementById('appFrame');

      const write = (line) => {
        log.textContent += `${line}\n`;
      };

      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      const waitFor = async (doc, selector, timeoutMs = 5000) => {
        const started = Date.now();
        while (Date.now() - started < timeoutMs) {
          const found = doc.querySelector(selector);
          if (found) return found;
          await wait(50);
        }
        return null;
      };

      const metricsFor = (doc, stepLabel) => {
        const shell = doc.querySelector('.theme-strip-shell');
        const viewport = doc.querySelector('[data-strip-viewport]');
        const track = doc.querySelector('.theme-strip-track');
        const bodyOverflow = doc.body.scrollWidth - doc.documentElement.clientWidth;
        const shellRect = shell ? shell.getBoundingClientRect() : { left: -1, right: -1 };
        return {
          stepLabel,
          viewportClient: viewport ? viewport.clientWidth : -1,
          viewportScroll: viewport ? viewport.scrollWidth : -1,
          viewportLeft: viewport ? Math.round(viewport.scrollLeft) : -1,
          trackWidth: track ? Math.round(track.getBoundingClientRect().width) : -1,
          shellLeft: Math.round(shellRect.left),
          shellRight: Math.round(shellRect.right),
          docClient: doc.documentElement.clientWidth,
          bodyScroll: doc.body.scrollWidth,
          overflowX: bodyOverflow
        };
      };

      const isBadShift = (m) => m.overflowX > 2 || m.shellRight > (m.docClient + 2);

      const renderMetric = (m) =>
        `${m.stepLabel}: overflowX=${m.overflowX}, viewport=${m.viewportClient}/${m.viewportScroll}, scrollLeft=${m.viewportLeft}, shell=${m.shellLeft}-${m.shellRight}, doc=${m.docClient}`;

      const finalize = (ok) => {
        status.textContent = ok ? 'PASS: Няма разместване/празно поле при 6/7/8.' : 'FAIL: Засечено е разместване.';
        status.className = `title ${ok ? 'ok' : 'bad'}`;
        document.documentElement.setAttribute('data-test-result', ok ? 'PASS' : 'FAIL');
      };

      frame.addEventListener('load', async () => {
        try {
          const doc = frame.contentDocument || frame.contentWindow.document;
          const firstCard = await waitFor(doc, '.theme-card[data-theme]', 7000);
          if (!firstCard) {
            write('Не намерих theme cards в timeout.');
            finalize(false);
            return;
          }

          await wait(120);
          const cards = Array.from(doc.querySelectorAll('.theme-card[data-theme]'));
          write(`Намерени категории: ${cards.length}`);
          if (cards.length < 8) {
            write('По-малко от 8 категории - тестът не е валиден.');
            finalize(false);
            return;
          }

          const testIndexes = [5, 6, 7];
          let hasShift = false;

          const initial = metricsFor(doc, 'initial');
          write(renderMetric(initial));
          if (isBadShift(initial)) hasShift = true;

          for (const idx of testIndexes) {
            const card = cards[idx];
            card.click();
            await wait(140);
            const m = metricsFor(doc, `click-${idx + 1}`);
            write(renderMetric(m));
            if (isBadShift(m)) hasShift = true;
          }

          finalize(!hasShift);
        } catch (error) {
          write(`Грешка: ${error && error.message ? error.message : String(error)}`);
          finalize(false);
        }
      });
    })();
  </script>
</body>
</html>
